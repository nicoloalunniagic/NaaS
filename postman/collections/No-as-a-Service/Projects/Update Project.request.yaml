$kind: http-request
name: Update Project
method: PUT
url: '{{baseUrl}}/projects/{{projectId}}'
order: 4000
pathVariables:
  - key: projectId
    value: '{{projectId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "My Project Updated",
      "description": "Updated description",
      "customerId": 1
    }
