name: deploy-web

on:
  workflow_dispatch:
    inputs:
      provision_swa_infra:
        description: "Provision Static Web App infrastructure before content deploy."
        required: false
        type: boolean
        default: true
      infra_tool:
        description: "Infrastructure tool to use when provision_swa_infra is true."
        required: false
        type: choice
        options:
          - bicep
          - terraform
        default: bicep
      skip_smoke:
        description: "Skip smoke test to reduce deploy time."
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        working-directory: src/web
        run: npm ci

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        if: ${{ inputs.provision_swa_infra == true }}
        shell: bash
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      - name: Resolve API base URL and SWA name
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          NAME_PREFIX="${{ vars.AZURE_NAME_PREFIX }}"

          CONTAINER_APP_NAME_GUESS="${NAME_PREFIX}-api"
          STATIC_WEB_APP_NAME="${NAME_PREFIX}-web"

          if az containerapp show -n "$CONTAINER_APP_NAME_GUESS" -g "$RG" --query name -o tsv >/dev/null 2>&1; then
            CONTAINER_APP_NAME="$CONTAINER_APP_NAME_GUESS"
          else
            CONTAINER_APP_NAME=$(az resource list -g "$RG" \
              --resource-type "Microsoft.App/containerApps" \
              --query "[0].name" -o tsv)
          fi

          if [[ -z "$CONTAINER_APP_NAME" ]]; then
            echo "Could not find Container App in '$RG'." >&2
            exit 1
          fi

          CONTAINER_APP_FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "static_web_app_name=$STATIC_WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "api_base_url=https://$CONTAINER_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Provision SWA infra with Bicep
        if: ${{ inputs.provision_swa_infra == true && inputs.infra_tool == 'bicep' }}
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: infra/bicep/swa.bicep
          parameters: >
            namePrefix=${{ vars.AZURE_NAME_PREFIX }}
            location=${{ vars.AZURE_LOCATION }}
            staticWebAppSku=${{ vars.AZURE_STATIC_WEB_APP_SKU }}
            apiBaseUrl=${{ steps.resolve.outputs.api_base_url }}
          deploymentMode: Incremental

      - name: Setup Terraform
        if: ${{ inputs.provision_swa_infra == true && inputs.infra_tool == 'terraform' }}
        uses: hashicorp/setup-terraform@v3

      - name: Provision SWA infra with Terraform
        if: ${{ inputs.provision_swa_infra == true && inputs.infra_tool == 'terraform' }}
        shell: bash
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP }}
          TF_VAR_name_prefix: ${{ vars.AZURE_NAME_PREFIX }}
          TF_VAR_db_administrator_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_jwt_signing_key: ${{ secrets.JWT_SIGNING_KEY }}
        run: |
          set -euo pipefail

          LOCATION="${{ vars.AZURE_LOCATION }}"
          POSTGRES_LOCATION="${{ vars.AZURE_POSTGRES_LOCATION }}"
          STATIC_WEB_APP_LOCATION="${{ vars.AZURE_STATIC_WEB_APP_LOCATION }}"
          STATIC_WEB_APP_SKU="${{ vars.AZURE_STATIC_WEB_APP_SKU }}"
          CONTAINER_IMAGE="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"

          if [[ -z "$POSTGRES_LOCATION" ]]; then
            POSTGRES_LOCATION="$LOCATION"
          fi

          if [[ -z "$STATIC_WEB_APP_LOCATION" ]]; then
            STATIC_WEB_APP_LOCATION="$LOCATION"
          fi

          if [[ -z "$STATIC_WEB_APP_SKU" ]]; then
            STATIC_WEB_APP_SKU="Free"
          fi

          terraform -chdir=infra/terraform init -input=false

          terraform -chdir=infra/terraform apply \
            -target=azurerm_static_web_app.swa \
            -auto-approve \
            -input=false \
            -var "deploy_static_web_app=true" \
            -var "resource_group_name=${{ vars.AZURE_RESOURCE_GROUP }}" \
            -var "location=$LOCATION" \
            -var "postgres_location=$POSTGRES_LOCATION" \
            -var "static_web_app_location=$STATIC_WEB_APP_LOCATION" \
            -var "static_web_app_sku=$STATIC_WEB_APP_SKU" \
            -var "api_base_url=${{ steps.resolve.outputs.api_base_url }}" \
            -var "container_image=$CONTAINER_IMAGE"

      - name: Discover existing Static Web App
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          STATIC_WEB_APP_NAME="${{ steps.resolve.outputs.static_web_app_name }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"

          if az staticwebapp show -n "$STATIC_WEB_APP_NAME" -g "$RG" --query name -o tsv >/dev/null 2>&1; then
            echo "static_web_app_name=$STATIC_WEB_APP_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FALLBACK=$(az resource list -g "$RG" \
            --resource-type "Microsoft.Web/staticSites" \
            --query "[0].name" -o tsv)

          if [[ -z "$FALLBACK" ]]; then
            echo "Could not find Static Web App in '$RG'." >&2
            exit 1
          fi

          echo "static_web_app_name=$FALLBACK" >> "$GITHUB_OUTPUT"

      - name: Build SPA
        working-directory: src/web
        env:
          VITE_API_BASE_URL: ${{ steps.resolve.outputs.api_base_url }}
        run: npm run build

      - name: Resolve SWA deployment token
        id: swa_token
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.discover.outputs.static_web_app_name }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: "upload"
          app_location: "src/web/dist"
          skip_app_build: true
          skip_api_build: true

      - name: Resolve app URL
        id: app_url
        shell: bash
        run: |
          STATIC_WEB_APP_FQDN=$(az staticwebapp show \
            --name "${{ steps.discover.outputs.static_web_app_name }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query defaultHostname -o tsv)
          echo "static_web_app_url=https://$STATIC_WEB_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed SPA
        if: ${{ inputs.skip_smoke == false }}
        shell: bash
        run: |
          BASE_URL="${{ steps.app_url.outputs.static_web_app_url }}"

          for attempt in {1..12}; do
            root_code=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE_URL/" || true)
            if [ "$root_code" = "200" ]; then
              echo "Smoke check ok: $BASE_URL"
              exit 0
            fi
            echo "Attempt $attempt/12: root=$root_code"
            sleep 10
          done

          echo "Smoke check failed"
          exit 1

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "### Static Web App deployment completed"
            echo ""
            echo "- Resource group: ${{ vars.AZURE_RESOURCE_GROUP }}"
            echo "- Provision SWA infra: ${{ inputs.provision_swa_infra }}"
            echo "- Infra tool: ${{ inputs.infra_tool }}"
            echo "- Static Web App: ${{ steps.discover.outputs.static_web_app_name }}"
            echo "- API base URL baked in: ${{ steps.resolve.outputs.api_base_url }}"
            echo "- URL: ${{ steps.app_url.outputs.static_web_app_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
