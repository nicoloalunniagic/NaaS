name: deploy-web

on:
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: 'Skip smoke test to reduce deploy time.'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        working-directory: src/web
        run: npm ci

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Discover existing Azure resources
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          NAME_PREFIX="${{ vars.AZURE_NAME_PREFIX }}"

          STATIC_WEB_APP_NAME_GUESS="${NAME_PREFIX}-web"
          CONTAINER_APP_NAME_GUESS="${NAME_PREFIX}-api"

          if az staticwebapp show -n "$STATIC_WEB_APP_NAME_GUESS" -g "$RG" --query name -o tsv >/dev/null 2>&1; then
            STATIC_WEB_APP_NAME="$STATIC_WEB_APP_NAME_GUESS"
          else
            STATIC_WEB_APP_NAME=$(az resource list -g "$RG" \
              --resource-type "Microsoft.Web/staticSites" \
              --query "[0].name" -o tsv)
          fi

          if az containerapp show -n "$CONTAINER_APP_NAME_GUESS" -g "$RG" --query name -o tsv >/dev/null 2>&1; then
            CONTAINER_APP_NAME="$CONTAINER_APP_NAME_GUESS"
          else
            CONTAINER_APP_NAME=$(az resource list -g "$RG" \
              --resource-type "Microsoft.App/containerApps" \
              --query "[0].name" -o tsv)
          fi

          if [[ -z "$STATIC_WEB_APP_NAME" || -z "$CONTAINER_APP_NAME" ]]; then
            echo "Could not find Static Web App or Container App in '$RG'." >&2
            exit 1
          fi

          CONTAINER_APP_FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "static_web_app_name=$STATIC_WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "api_base_url=https://$CONTAINER_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Build SPA
        working-directory: src/web
        env:
          VITE_API_BASE_URL: ${{ steps.discover.outputs.api_base_url }}
        run: npm run build

      - name: Resolve SWA deployment token
        id: swa_token
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.discover.outputs.static_web_app_name }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: 'upload'
          app_location: 'src/web/dist'
          skip_app_build: true
          skip_api_build: true

      - name: Resolve app URL
        id: app_url
        shell: bash
        run: |
          STATIC_WEB_APP_FQDN=$(az staticwebapp show \
            --name "${{ steps.discover.outputs.static_web_app_name }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query defaultHostname -o tsv)
          echo "static_web_app_url=https://$STATIC_WEB_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed SPA
        if: ${{ inputs.skip_smoke == false }}
        shell: bash
        run: |
          BASE_URL="${{ steps.app_url.outputs.static_web_app_url }}"

          for attempt in {1..12}; do
            root_code=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE_URL/" || true)
            if [ "$root_code" = "200" ]; then
              echo "Smoke check ok: $BASE_URL"
              exit 0
            fi
            echo "Attempt $attempt/12: root=$root_code"
            sleep 10
          done

          echo "Smoke check failed"
          exit 1

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "### Static Web App deployment completed"
            echo ""
            echo "- Resource group: ${{ vars.AZURE_RESOURCE_GROUP }}"
            echo "- Static Web App: ${{ steps.discover.outputs.static_web_app_name }}"
            echo "- API base URL baked in: ${{ steps.discover.outputs.api_base_url }}"
            echo "- URL: ${{ steps.app_url.outputs.static_web_app_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
