name: deploy

on:
  workflow_dispatch:
    inputs:
      topology:
        required: false
        type: choice
        options: [public, private]
        default: public
      infra_tool:
        required: false
        type: choice
        options: [bicep, terraform]
        default: bicep
      skip_infra:
        required: false
        type: boolean
        default: false
      skip_smoke:
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ inputs.topology }}-${{ inputs.infra_tool }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail

          LOCATION="${{ vars.AZURE_SWA_LOCATION }}"
          CORE_LOCATION="${{ vars.AZURE_PRIMARY_LOCATION }}"
          POSTGRES_LOCATION="${{ vars.AZURE_POSTGRES_LOCATION }}"
          STATIC_WEB_APP_LOCATION="${{ vars.AZURE_STATIC_WEB_APP_LOCATION }}"
          STATIC_WEB_APP_SKU="${{ vars.AZURE_STATIC_WEB_APP_SKU }}"

          [[ "${{ inputs.topology }}" == "public" ]] && TP="p" || TP="x"
          [[ "${{ inputs.infra_tool }}" == "bicep" ]] && TL="b" || TL="t"
          IAC_SUFFIX="${TP}${TL}"

          RUN_SUFFIX="${GITHUB_RUN_NUMBER: -6}"
          EFFECTIVE_NAME_PREFIX="${{ vars.AZURE_NAME_PREFIX }}${RUN_SUFFIX}${IAC_SUFFIX}"

          if [[ "${#EFFECTIVE_NAME_PREFIX}" -gt 12 ]]; then
            echo "EFFECTIVE_NAME_PREFIX '${EFFECTIVE_NAME_PREFIX}' exceeds 12 characters. Shorten AZURE_NAME_PREFIX." >&2
            exit 1
          fi

          CORE_LOCATION="${CORE_LOCATION:-$LOCATION}"
          POSTGRES_LOCATION="${POSTGRES_LOCATION:-$CORE_LOCATION}"
          STATIC_WEB_APP_LOCATION="${STATIC_WEB_APP_LOCATION:-$LOCATION}"
          STATIC_WEB_APP_SKU="${STATIC_WEB_APP_SKU:-Free}"

          echo "location=$LOCATION" >> "$GITHUB_OUTPUT"
          echo "core_location=$CORE_LOCATION" >> "$GITHUB_OUTPUT"
          echo "postgres_location=$POSTGRES_LOCATION" >> "$GITHUB_OUTPUT"
          echo "static_web_app_location=$STATIC_WEB_APP_LOCATION" >> "$GITHUB_OUTPUT"
          echo "static_web_app_sku=$STATIC_WEB_APP_SKU" >> "$GITHUB_OUTPUT"
          echo "bootstrap_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" >> "$GITHUB_OUTPUT"
          echo "effective_name_prefix=$EFFECTIVE_NAME_PREFIX" >> "$GITHUB_OUTPUT"
          echo "effective_resource_group=${{ vars.AZURE_RESOURCE_GROUP }}-${IAC_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        working-directory: src/web
        run: npm ci

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        shell: bash
        run: |
          az group create \
            --name "${{ steps.settings.outputs.effective_resource_group }}" \
            --location "${{ steps.settings.outputs.location }}"

      - name: Setup Terraform
        if: ${{ inputs.infra_tool == 'terraform' }}
        uses: hashicorp/setup-terraform@v3

      - name: Deploy core infra with Bicep (without SWA)
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'bicep' }}
        id: core_infra_bicep
        uses: azure/arm-deploy@v2
        env:
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ steps.settings.outputs.effective_resource_group }}
          template: infra/${{ inputs.topology }}/bicep/main.bicep
          parameters: >
            infra/${{ inputs.topology }}/bicep/dev.bicepparam
            namePrefix=${{ steps.settings.outputs.effective_name_prefix }}
            location=${{ steps.settings.outputs.core_location }}
            deployStaticWebApp=false
            staticWebAppLocation=${{ steps.settings.outputs.static_web_app_location }}
            staticWebAppSku=${{ steps.settings.outputs.static_web_app_sku }}
            containerImage=${{ steps.settings.outputs.bootstrap_image }}
          deploymentMode: Incremental

      - name: Deploy core infra with Terraform (without SWA)
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'terraform' }}
        shell: bash
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_resource_group_name: ${{ steps.settings.outputs.effective_resource_group }}
          TF_VAR_name_prefix: ${{ steps.settings.outputs.effective_name_prefix }}
          TF_VAR_db_administrator_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_jwt_signing_key: ${{ secrets.JWT_SIGNING_KEY }}
        run: |
          set -euo pipefail

          terraform -chdir=infra/${{ inputs.topology }}/terraform init -input=false

          terraform -chdir=infra/${{ inputs.topology }}/terraform apply \
            -auto-approve \
            -input=false \
            -var "deploy_static_web_app=false" \
            -var "location=${{ steps.settings.outputs.core_location }}" \
            -var "postgres_location=${{ steps.settings.outputs.postgres_location }}" \
            -var "static_web_app_location=${{ steps.settings.outputs.static_web_app_location }}" \
            -var "static_web_app_sku=${{ steps.settings.outputs.static_web_app_sku }}" \
            -var "container_image=${{ steps.settings.outputs.bootstrap_image }}"

      - name: Discover existing Azure resources
        id: discover_core
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ steps.settings.outputs.effective_resource_group }}"
          NAME_PREFIX="${{ steps.settings.outputs.effective_name_prefix }}"

          if [[ -n "${{ steps.core_infra_bicep.outputs.containerRegistryName }}" ]]; then
            ACR_NAME="${{ steps.core_infra_bicep.outputs.containerRegistryName }}"
            ACR_LOGIN_SERVER="${{ steps.core_infra_bicep.outputs.containerRegistryLoginServer }}"
            CONTAINER_APP_NAME="${{ steps.core_infra_bicep.outputs.containerAppName }}"
          else
            ACR_NAME_GUESS="${NAME_PREFIX}acr"
            if az acr show -n "$ACR_NAME_GUESS" --query name -o tsv >/dev/null 2>&1; then
              ACR_NAME="$ACR_NAME_GUESS"
            else
              ACR_NAME=$(az resource list -g "$RG" \
                --resource-type "Microsoft.ContainerRegistry/registries" \
                --query "[0].name" -o tsv)
            fi

            ACR_LOGIN_SERVER=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)

            CONTAINER_APP_NAME_GUESS="${NAME_PREFIX}-api"
            if az containerapp show -n "$CONTAINER_APP_NAME_GUESS" -g "$RG" --query name -o tsv >/dev/null 2>&1; then
              CONTAINER_APP_NAME="$CONTAINER_APP_NAME_GUESS"
            else
              CONTAINER_APP_NAME=$(az resource list -g "$RG" \
                --resource-type "Microsoft.App/containerApps" \
                --query "[0].name" -o tsv)
            fi
          fi

          if [[ -z "$ACR_NAME" || -z "$CONTAINER_APP_NAME" ]]; then
            echo "Could not find ACR or Container App in '$RG'." >&2
            exit 1
          fi

          echo "container_registry_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "container_registry_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "container_app_name=$CONTAINER_APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image via ACR Tasks
        shell: bash
        run: |
          IMAGE_TAG="$(echo "$GITHUB_SHA" | cut -c1-12)"
          IMAGE_URI="${{ steps.discover_core.outputs.container_registry_login_server }}/naas:$IMAGE_TAG"

          az acr build \
            --registry "${{ steps.discover_core.outputs.container_registry_name }}" \
            --image "naas:$IMAGE_TAG" \
            --file docker/Dockerfile \
            .

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Update Container App image
        shell: bash
        run: |
          az containerapp update \
            --name "${{ steps.discover_core.outputs.container_app_name }}" \
            --resource-group "${{ steps.settings.outputs.effective_resource_group }}" \
            --image "${{ env.IMAGE_URI }}" \
            --output none

      - name: Resolve API base URL
        if: inputs.topology == 'public'
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          CONTAINER_APP_FQDN=$(az containerapp show \
            --name "${{ steps.discover_core.outputs.container_app_name }}" \
            --resource-group "${{ steps.settings.outputs.effective_resource_group }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "api_base_url=https://$CONTAINER_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Deploy SWA with Bicep
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'bicep' }}
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ steps.settings.outputs.effective_resource_group }}
          template: infra/${{ inputs.topology }}/bicep/swa.bicep
          parameters: >
            namePrefix=${{ steps.settings.outputs.effective_name_prefix }}
            location=${{ steps.settings.outputs.static_web_app_location }}
            staticWebAppSku=${{ steps.settings.outputs.static_web_app_sku }}
            apiBaseUrl=${{ steps.resolve.outputs.api_base_url || '' }}
          deploymentMode: Incremental

      - name: Deploy SWA with Terraform
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'terraform' }}
        shell: bash
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_resource_group_name: ${{ steps.settings.outputs.effective_resource_group }}
          TF_VAR_name_prefix: ${{ steps.settings.outputs.effective_name_prefix }}
          TF_VAR_db_administrator_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_jwt_signing_key: ${{ secrets.JWT_SIGNING_KEY }}
        run: |
          set -euo pipefail

          terraform -chdir=infra/${{ inputs.topology }}/terraform init -input=false

          terraform -chdir=infra/${{ inputs.topology }}/terraform apply \
            -target=azurerm_static_web_app.swa \
            -auto-approve \
            -input=false \
            -var "deploy_static_web_app=true" \
            -var "location=${{ steps.settings.outputs.core_location }}" \
            -var "postgres_location=${{ steps.settings.outputs.postgres_location }}" \
            -var "static_web_app_location=${{ steps.settings.outputs.static_web_app_location }}" \
            -var "static_web_app_sku=${{ steps.settings.outputs.static_web_app_sku }}" \
            -var "api_base_url=${{ steps.resolve.outputs.api_base_url || '' }}" \
            -var "container_image=${{ env.IMAGE_URI }}"

      - name: Discover existing Static Web App
        id: discover_swa
        shell: bash
        run: |
          set -euo pipefail
          SWA_NAME="${{ steps.settings.outputs.effective_name_prefix }}-web"
          RG="${{ steps.settings.outputs.effective_resource_group }}"

          if az staticwebapp show -n "$SWA_NAME" -g "$RG" --query name -o tsv >/dev/null 2>&1; then
            echo "static_web_app_name=$SWA_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FALLBACK=$(az resource list -g "$RG" \
            --resource-type "Microsoft.Web/staticSites" \
            --query "[0].name" -o tsv)

          if [[ -z "$FALLBACK" ]]; then
            echo "Could not find Static Web App in '$RG'." >&2
            exit 1
          fi

          echo "static_web_app_name=$FALLBACK" >> "$GITHUB_OUTPUT"

      - name: Build SPA
        working-directory: src/web
        env:
          VITE_API_BASE_URL: ${{ steps.resolve.outputs.api_base_url || '' }}
        run: npm run build

      - name: Resolve SWA deployment token
        id: swa_token
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.discover_swa.outputs.static_web_app_name }}" \
            --resource-group "${{ steps.settings.outputs.effective_resource_group }}" \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: "upload"
          app_location: "src/web/dist"
          skip_app_build: true
          skip_api_build: true

      - name: Resolve app URL
        id: app_url
        shell: bash
        run: |
          STATIC_WEB_APP_FQDN=$(az staticwebapp show \
            --name "${{ steps.discover_swa.outputs.static_web_app_name }}" \
            --resource-group "${{ steps.settings.outputs.effective_resource_group }}" \
            --query defaultHostname -o tsv)
          echo "static_web_app_url=https://$STATIC_WEB_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test API and SPA
        if: ${{ inputs.skip_smoke == false && inputs.topology == 'public' }}
        shell: bash
        run: |
          API_BASE_URL="${{ steps.resolve.outputs.api_base_url }}"
          BASE_URL="${{ steps.app_url.outputs.static_web_app_url }}"

          for attempt in {1..12}; do
            root_code=$(curl -sS -o /dev/null -w "%{http_code}" "$API_BASE_URL/" || true)
            openapi_code=$(curl -sS -o /dev/null -w "%{http_code}" "$API_BASE_URL/openapi/v1.json" || true)
            [ "$root_code" = "200" ] && [ "$openapi_code" = "200" ] && break
            [ "$attempt" = "12" ] && { echo "API smoke check failed"; exit 1; }
            sleep 10
          done

          for attempt in {1..12}; do
            root_code=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE_URL/" || true)
            [ "$root_code" = "200" ] && exit 0
            sleep 10
          done

          echo "Public smoke check failed"
          exit 1

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "### Deployment completed"
            echo ""
            echo "- Resource group: ${{ steps.settings.outputs.effective_resource_group }}"
            echo "- Topology: ${{ inputs.topology }}"
            echo "- Infra tool: ${{ inputs.infra_tool }}"
            echo "- Name prefix: ${{ steps.settings.outputs.effective_name_prefix }}"
            echo "- Container App: ${{ steps.discover_core.outputs.container_app_name }}"
            echo "- API image: ${{ env.IMAGE_URI }}"
            echo "- Static Web App: ${{ steps.discover_swa.outputs.static_web_app_name }}"
            echo "- URL: ${{ steps.app_url.outputs.static_web_app_url }}"
            echo "- API URL: ${{ inputs.topology == 'public' && steps.resolve.outputs.api_base_url || 'internal VNet only' }}"
          } >> "$GITHUB_STEP_SUMMARY"
