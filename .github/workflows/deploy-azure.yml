name: deploy-azure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve parameters file
        id: params
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PARAMS_FILE="infra/azure/prod.bicepparam"
          else
            PARAMS_FILE="infra/azure/dev.bicepparam"
          fi
          echo "params_file=$PARAMS_FILE" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        shell: bash
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      - name: Deploy infra (bootstrap image)
        id: infra_bootstrap
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: infra/azure/main.bicep
          parameters: >
            ${{ steps.params.outputs.params_file }}
            containerImage=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
          deploymentMode: Incremental

      - name: Build and push Docker image via ACR Tasks
        shell: bash
        run: |
          ACR_NAME="${{ steps.infra_bootstrap.outputs.containerRegistryName }}"
          ACR_LOGIN_SERVER="${{ steps.infra_bootstrap.outputs.containerRegistryLoginServer }}"
          IMAGE_TAG="$(echo "$GITHUB_SHA" | cut -c1-12)"
          IMAGE_URI="$ACR_LOGIN_SERVER/naas:$IMAGE_TAG"

          az acr build \
            --registry "$ACR_NAME" \
            --image "naas:$IMAGE_TAG" \
            --file docker/Dockerfile \
            .

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Update Container App image
        id: update_app
        shell: bash
        run: |
          CONTAINER_APP_NAME="${{ steps.infra_bootstrap.outputs.containerAppName }}"

          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_URI }}" \
            --output none

      - name: Resolve app URL
        id: app_url
        shell: bash
        run: |
          CONTAINER_APP_NAME="${{ steps.infra_bootstrap.outputs.containerAppName }}"
          CONTAINER_APP_FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "container_app_url=https://$CONTAINER_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed app
        shell: bash
        run: |
          CONTAINER_APP_URL="${{ steps.app_url.outputs.container_app_url }}"
          BASE_URL="$CONTAINER_APP_URL"
          ROOT_URL="$BASE_URL/"
          OPENAPI_URL="$BASE_URL/openapi/v1.json"

          for attempt in {1..12}; do
            root_code=$(curl -sS -o /dev/null -w "%{http_code}" "$ROOT_URL" || true)
            openapi_code=$(curl -sS -o /dev/null -w "%{http_code}" "$OPENAPI_URL" || true)

            if [ "$root_code" = "200" ] && [ "$openapi_code" = "200" ]; then
              echo "Smoke check ok: root endpoint ($ROOT_URL)"
              echo "Smoke check ok: openapi endpoint ($OPENAPI_URL)"
              exit 0
            fi

            echo "Attempt $attempt/12: root=$root_code openapi=$openapi_code"
            sleep 10
          done

          echo "Smoke check failed: root or openapi endpoint did not return HTTP 200"
          exit 1

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "### Azure deployment completed"
            echo ""
            echo "- Resource group: ${{ vars.AZURE_RESOURCE_GROUP }}"
            echo "- Params file: ${{ steps.params.outputs.params_file }}"
            echo "- URL: ${{ steps.app_url.outputs.container_app_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
