name: deploy-azure

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "docker/**"
      - "infra/azure/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  TEMPLATE_FILE: infra/azure/main.bicep
  PARAMS_FILE: infra/azure/main.parameters.example.json

jobs:
  deploy:
    runs-on:
      - self-hosted
      - azure
      - aca

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (Managed Identity)
        run: az login --identity --username "${{ vars.MI_CLIENT_ID }}"

      - name: Set subscription
        run: az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Validate required repo variables
        shell: bash
        run: |
          if [ -z "${{ vars.AZURE_RESOURCE_GROUP }}" ]; then
            echo "Missing AZURE_RESOURCE_GROUP"
            exit 1
          fi
          if [ -z "${{ vars.AZURE_LOCATION }}" ]; then
            echo "Missing AZURE_LOCATION"
            exit 1
          fi
          if [ -z "${{ vars.AZURE_NAME_PREFIX }}" ]; then
            echo "Missing AZURE_NAME_PREFIX"
            exit 1
          fi

      - name: Create resource group
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      - name: Build and push Docker image via ACR Tasks
        run: |
          IMAGE_TAG="$(echo "$GITHUB_SHA" | cut -c1-12)"
          IMAGE_URI="$ACR_LOGIN_SERVER/noaas:$IMAGE_TAG"

          az acr build \
            --registry "$ACR_NAME" \
            --image "noaas:$IMAGE_TAG" \
            --file docker/Dockerfile \
            .

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
