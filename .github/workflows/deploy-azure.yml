name: deploy-azure

on:
  workflow_dispatch:
    inputs:
      infra_tool:
        description: "Infrastructure tool to use for provisioning."
        required: false
        type: choice
        options:
          - bicep
          - terraform
        default: bicep
      skip_infra:
        description:
          "Skip infra deploy (image-only fast path). Resources must already
          exist."
        required: false
        type: boolean
        default: true
      skip_smoke:
        description: "Skip smoke test to reduce deploy time."
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        if: ${{ inputs.skip_infra == false }}
        shell: bash
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      - name: Resolve parameters file
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'bicep' }}
        id: params
        shell: bash
        run: |
          echo "params_file=infra/bicep/dev.bicepparam" >> "$GITHUB_OUTPUT"

      - name: Deploy infra with Bicep (bootstrap image)
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'bicep' }}
        id: infra
        uses: azure/arm-deploy@v2
        env:
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: infra/bicep/main.bicep
          parameters: >
            ${{ steps.params.outputs.params_file }}
            deployStaticWebApp=false
            containerImage=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
          deploymentMode: Incremental

      - name: Setup Terraform
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'terraform' }}
        uses: hashicorp/setup-terraform@v3

      - name: Deploy infra with Terraform (bootstrap image)
        if: ${{ inputs.skip_infra == false && inputs.infra_tool == 'terraform' }}
        shell: bash
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP }}
          TF_VAR_name_prefix: ${{ vars.AZURE_NAME_PREFIX }}
          TF_VAR_db_administrator_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_jwt_signing_key: ${{ secrets.JWT_SIGNING_KEY }}
        run: |
          set -euo pipefail

          LOCATION="${{ vars.AZURE_LOCATION }}"
          POSTGRES_LOCATION="${{ vars.AZURE_POSTGRES_LOCATION }}"
          STATIC_WEB_APP_LOCATION="${{ vars.AZURE_STATIC_WEB_APP_LOCATION }}"
          CONTAINER_IMAGE="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"

          if [[ -z "$POSTGRES_LOCATION" ]]; then
            POSTGRES_LOCATION="$LOCATION"
          fi

          if [[ -z "$STATIC_WEB_APP_LOCATION" ]]; then
            STATIC_WEB_APP_LOCATION="$LOCATION"
          fi

          terraform -chdir=infra/terraform init -input=false

          terraform -chdir=infra/terraform apply \
            -auto-approve \
            -input=false \
            -var "deploy_static_web_app=false" \
            -var "location=$LOCATION" \
            -var "postgres_location=$POSTGRES_LOCATION" \
            -var "static_web_app_location=$STATIC_WEB_APP_LOCATION" \
            -var "container_image=$CONTAINER_IMAGE"

      - name: Discover existing Azure resources
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          NAME_PREFIX="${{ vars.AZURE_NAME_PREFIX }}"

          ACR_NAME_GUESS="${NAME_PREFIX}acr"
          CONTAINER_APP_NAME_GUESS="${NAME_PREFIX}-api"

          if [[ -n "${{ steps.infra.outputs.containerRegistryName }}" ]]; then
            ACR_NAME="${{ steps.infra.outputs.containerRegistryName }}"
            ACR_LOGIN_SERVER="${{ steps.infra.outputs.containerRegistryLoginServer }}"
            CONTAINER_APP_NAME="${{ steps.infra.outputs.containerAppName }}"
          else
            if az acr show -n "$ACR_NAME_GUESS" --query name -o tsv >/dev/null 2>&1; then
              ACR_NAME="$ACR_NAME_GUESS"
            else
              ACR_NAME=$(az resource list -g "$RG" \
                --resource-type "Microsoft.ContainerRegistry/registries" \
                --query "[0].name" -o tsv)
            fi

            ACR_LOGIN_SERVER=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)

            if az containerapp show -n "$CONTAINER_APP_NAME_GUESS" -g "$RG" --query name -o tsv >/dev/null 2>&1; then
              CONTAINER_APP_NAME="$CONTAINER_APP_NAME_GUESS"
            else
              CONTAINER_APP_NAME=$(az resource list -g "$RG" \
                --resource-type "Microsoft.App/containerApps" \
                --query "[0].name" -o tsv)
            fi
          fi

          if [[ -z "$ACR_NAME" || -z "$CONTAINER_APP_NAME" ]]; then
            echo "Could not find ACR or Container App in '$RG'." >&2
            exit 1
          fi

          echo "container_registry_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "container_registry_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "container_app_name=$CONTAINER_APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image via ACR Tasks
        shell: bash
        run: |
          IMAGE_TAG="$(echo "$GITHUB_SHA" | cut -c1-12)"
          IMAGE_URI="${{ steps.discover.outputs.container_registry_login_server }}/naas:$IMAGE_TAG"

          az acr build \
            --registry "${{ steps.discover.outputs.container_registry_name }}" \
            --image "naas:$IMAGE_TAG" \
            --file docker/Dockerfile \
            .

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Update Container App image
        shell: bash
        run: |
          az containerapp update \
            --name "${{ steps.discover.outputs.container_app_name }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_URI }}" \
            --output none

      - name: Resolve app URL
        id: app_url
        shell: bash
        run: |
          CONTAINER_APP_FQDN=$(az containerapp show \
            --name "${{ steps.discover.outputs.container_app_name }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "container_app_url=https://$CONTAINER_APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed app
        if: ${{ inputs.skip_smoke == false }}
        shell: bash
        run: |
          BASE_URL="${{ steps.app_url.outputs.container_app_url }}"

          for attempt in {1..12}; do
            root_code=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE_URL/" || true)
            openapi_code=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE_URL/openapi/v1.json" || true)

            if [ "$root_code" = "200" ] && [ "$openapi_code" = "200" ]; then
              echo "Smoke check ok: $BASE_URL"
              exit 0
            fi

            echo "Attempt $attempt/12: root=$root_code openapi=$openapi_code"
            sleep 10
          done

          echo "Smoke check failed"
          exit 1

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "### Azure deployment completed"
            echo ""
            echo "- Resource group: ${{ vars.AZURE_RESOURCE_GROUP }}"
            echo "- Infra tool: ${{ inputs.infra_tool }}"
            echo "- Skip infra: ${{ inputs.skip_infra }}"
            echo "- Skip smoke: ${{ inputs.skip_smoke }}"
            echo "- Container App: ${{ steps.discover.outputs.container_app_name }}"
            echo "- Image: ${{ env.IMAGE_URI }}"
            echo "- URL: ${{ steps.app_url.outputs.container_app_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
