name: deploy-azure

on:
  push:
    branches:
      - main
      - master
    paths:
      - src/**
      - docker/**
      - infra/azure/**
      - .github/workflows/deploy-azure.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TEMPLATE_FILE: infra/azure/main.bicep
  PARAMS_FILE: infra/azure/main.parameters.example.json

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required repo variables
        shell: bash
        run: |
          test -n "${{ vars.AZURE_RESOURCE_GROUP }}" || (echo "Missing repo variable AZURE_RESOURCE_GROUP" && exit 1)
          test -n "${{ vars.AZURE_LOCATION }}" || (echo "Missing repo variable AZURE_LOCATION" && exit 1)
          test -n "${{ vars.AZURE_NAME_PREFIX }}" || (echo "Missing repo variable AZURE_NAME_PREFIX" && exit 1)

      - name: Create resource group
        shell: bash
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      - name: Deploy infra (bootstrap image)
        id: infra_bootstrap
        shell: bash
        run: |
          BOOTSTRAP_IMAGE="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          DEPLOY_NAME="infra-bootstrap-${GITHUB_RUN_NUMBER}"

          az deployment group create \
            --name "$DEPLOY_NAME" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file "$TEMPLATE_FILE" \
            --parameters @"$PARAMS_FILE" \
            --parameters location="${{ vars.AZURE_LOCATION }}" \
            --parameters namePrefix="${{ vars.AZURE_NAME_PREFIX }}" \
            --parameters containerImage="$BOOTSTRAP_IMAGE"

          ACR_NAME=$(az deployment group show \
            --name "$DEPLOY_NAME" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.outputs.containerRegistryName.value" -o tsv)

          ACR_LOGIN_SERVER=$(az deployment group show \
            --name "$DEPLOY_NAME" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.outputs.containerRegistryLoginServer.value" -o tsv)

          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        shell: bash
        run: |
          az acr login --name "$ACR_NAME"

          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="$ACR_LOGIN_SERVER/noaas:$IMAGE_TAG"

          docker build -f docker/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy app with pushed image
        id: deploy_app
        shell: bash
        run: |
          DEPLOY_NAME="infra-app-${GITHUB_RUN_NUMBER}"

          az deployment group create \
            --name "$DEPLOY_NAME" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file "$TEMPLATE_FILE" \
            --parameters @"$PARAMS_FILE" \
            --parameters location="${{ vars.AZURE_LOCATION }}" \
            --parameters namePrefix="${{ vars.AZURE_NAME_PREFIX }}" \
            --parameters containerImage="$IMAGE_URI"

          APP_URL=$(az deployment group show \
            --name "$DEPLOY_NAME" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.outputs.containerAppUrl.value" -o tsv)

          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          echo "Container App URL: ${{ steps.deploy_app.outputs.app_url }}"
